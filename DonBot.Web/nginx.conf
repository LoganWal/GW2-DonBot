map $uri $donbot_spa_route {
    default 0;
    / 1;
    ~^/auth/error/?$ 1;
    ~^/(admin|bests|dashboard|leaderboard|live-raid|mechanics|points|privacy|progression|scheduling|stats|terms|verify)/?$ 1;
    ~^/logs/?$ 1;
    ~^/logs/(aggregate|upload)/?$ 1;
    ~^/logs/[0-9]+/?$ 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;
    server_tokens off;

    location = /favicon.ico {
        try_files /favicon.ico /donbot.png =404;
    }

    location = /config.js {
        try_files $uri =404;
    }

    location ^~ /_nuxt/ {
        try_files $uri =404;
    }

    location ^~ /api/ {
        return 404;
    }

    location ~ (^|/)\. {
        return 404;
    }

    location ~* ^/(actuator|config|infra|private|wp-json)(/|$) {
        return 404;
    }

    location ~* /(credentials|docker-compose|secrets?|appsettings)(\.[^/]*)?$ {
        return 404;
    }

    location / {
        try_files $uri $uri/ @donbot_spa;
    }

    location @donbot_spa {
        if ($donbot_spa_route = 0) {
            return 404;
        }

        try_files /index.html =404;
    }
}
